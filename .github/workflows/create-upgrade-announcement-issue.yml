name: Create Release Issue

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target release network (Mainnet issues include Calibnet rollout first)'
        required: true
        type: choice
        options:
          - Calibnet
          - Mainnet
      stack_version:
        description: 'Stack release version for the issue title, e.g. v1.2.3'
        required: false
        type: string
      fwss_version:
        description: 'Deprecated alias for stack_version; leave blank unless using older automation'
        required: false
        type: string
      fwss_contract_version:
        description: 'Expected FilecoinWarmStorageService VERSION(), without leading v; use TBD when unchanged or unknown'
        required: false
        type: string
        default: 'TBD'
      upgrade_type:
        description: 'Type of upgrade'
        required: true
        type: choice
        options:
          - Routine
          - Breaking Change
      dry_run:
        description: 'Dry run (preview issue without creating it)'
        required: false
        type: boolean
        default: false

jobs:
  create-announcement:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create announcement issue
        env:
          NETWORK: ${{ inputs.network }}
          RELEASE_VERSION: ${{ inputs.stack_version || inputs.fwss_version || 'vX.Y.Z' }}
          FWSS_VERSION: ${{ inputs.fwss_contract_version }}
          UPGRADE_TYPE: ${{ inputs.upgrade_type }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node .github/scripts/create-upgrade-announcement.js --dry-run
          else
            node .github/scripts/create-upgrade-announcement.js
          fi

      - name: Summary
        run: |
          {
            echo "## Release Issue ${{ inputs.dry_run == true && '(Dry Run)' || 'Created' }}"
            echo ""
            echo "**Stack version**: ${{ inputs.stack_version || inputs.fwss_version || 'vX.Y.Z' }}"
            echo "**FWSS contract VERSION()**: ${{ inputs.fwss_contract_version }}"
            echo "**Network**: ${{ inputs.network }}"
            echo "**Workflow ref**: \\`${{ github.ref_name }}\\`"
            echo "**Checklist source**: \\`service_contracts/tools/UPGRADE-CHECKLIST.md\\` @ \\`${{ github.sha }}\\`"
            echo ""
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "This was a dry run. No issue was created."
            else
              echo "See the created issue for the rendered checklist."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
